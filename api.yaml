openapi: 3.0.0
info:
  title: Sistema de Gestão de Eventos
  version: 1.0.0
  description: API para gestão de utilizadores, carros, inscrições, bilhetes e pagamentos

servers:
  - url: http://localhost:3000/api


paths:

  # AUTH

  /auth/register:
    post:
      summary: Registar utilizador
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: joao@gmail.com
                password:
                  type: string
                  example: 123456
                role:
                  type: string
                  example: cliente
      responses:
        '201':
          description: Utilizador criado com sucesso
        '400':
          description: Email já existe ou dados inválidos
        '500':
          description: Erro no servidor

  /auth/login:
    post:
      summary: Autenticar utilizador
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: joao@gmail.com
                password:
                  type: string
                  example: 123456
      responses:
        '200':
          description: Login com sucesso (retorna token)
        '403':
          description: Credenciais inválidas
        '500':
          description: Erro no servidor

  /auth/refresh-token:
    post:
      summary: Renovar token
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Token renovado com sucesso
        '401':
          description: Token não fornecido
        '403':
          description: Token inválido ou expirado
        '500':
          description: Erro no servidor

  /auth/logout:
    post:
      summary: Logout do utilizador
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso

  /auth/{id}:
    delete:
      summary: Eliminar utilizador (apenas admin)
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Utilizador eliminado com sucesso
        '400':
          description: Não pode eliminar o próprio utilizador
        '403':
          description: Acesso negado (não admin)
        '404':
          description: Utilizador não encontrado
        '500':
          description: Erro no servidor

  #EVENTOS
  /eventos:
    get:
      summary: Listar eventos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de eventos

    post:
      summary: Criar evento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                data:
                  type: string
                local_evento:
                  type: string
                preco_visitante:
                  type: number
                preco_participante:
                  type: number
      responses:
        '201':
          description: Evento criado

  /eventos/{id}:
    get:
      summary: Obter evento por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Evento encontrado

    put:
      summary: Atualizar evento
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Evento atualizado

    delete:
      summary: Apagar evento
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Evento apagado


  #PESSOAS
  /pessoas:
    get:
      summary: Listar pessoas
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pessoas

    post:
      summary: Criar pessoa
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Pessoa criada

  /pessoas/{id}:
    get:
      summary: Obter pessoa por NIF
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pessoa encontrada


  #CARROS
  /carros:
    get:
      summary: Listar carros
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de carros

    post:
      summary: Criar carro
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Carro criado


  #BILHETES
  /bilhetes:
    get:
      summary: Listar bilhetes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de bilhetes

    post:
      summary: Criar bilhete
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Bilhete criado


  #PAGAMENTOS
  /pagamentos:
    get:
      summary: Listar pagamentos
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de pagamentos

    post:
      summary: Criar pagamento
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Pagamento criado


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT